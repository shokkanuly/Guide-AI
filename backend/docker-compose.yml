version: "3.9"

services:

  # ---- PostgreSQL ----
  postgres:
    image: postgres:16-alpine
    container_name: govguide_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: govguide
      POSTGRES_PASSWORD: password
      POSTGRES_DB: govguide_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U govguide -d govguide_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- Redis ----
  redis:
    image: redis:7-alpine
    container_name: govguide_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ---- ChromaDB (Vector Store) ----
  chromadb:
    image: chromadb/chroma:latest
    container_name: govguide_chroma
    restart: unless-stopped
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      IS_PERSISTENT: "TRUE"
      ANONYMIZED_TELEMETRY: "FALSE"

  # ---- FastAPI Backend ----
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: govguide_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://govguide:password@postgres:5432/govguide_db
      DATABASE_URL_SYNC: postgresql://govguide:password@postgres:5432/govguide_db
      REDIS_URL: redis://redis:6379/0
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chromadb:
        condition: service_started
    volumes:
      - ./app:/app/app:ro  # Mount for hot-reload in dev
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ---- Next.js Frontend ----
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: govguide_nextjs
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      BACKEND_API_URL: http://backend:8000
    depends_on:
      - backend

  # ---- Nginx Gateway / Reverse Proxy ----
  gateway:
    image: nginx:alpine
    container_name: govguide_gateway
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ../nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 15s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
  redis_data:
  chroma_data:
